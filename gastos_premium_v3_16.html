
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --nu:#7c3aed;--nu-bg:#ede9fe;--nu-txt:#6d28d9;
  --c6:#2563eb;--c6-bg:#dbeafe;--c6-txt:#1d4ed8;
  --fix:#059669;--fix-bg:#d1fae5;--fix-txt:#047857;
  --rai:#db2777;--rai-bg:#fce7f3;--rai-txt:#be185d;
  --in:#16a34a;--in-bg:#dcfce7;
  --danger:#dc2626;--danger-bg:#fee2e2;
  --bg:#f1f5f9;--surface:#ffffff;--border:#e2e8f0;
  --text:#0f172a;--text2:#64748b;--text3:#94a3b8;
  --radius:16px;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
}
html,body{background:var(--bg);font-family:'Inter',system-ui,sans-serif}
.app{max-width:680px;margin:0 auto;min-height:100vh;background:var(--bg);padding-bottom:90px}

/* ── HEADER ── */
.topbar{background:linear-gradient(135deg,#1e1b4b 0%,#312e81 50%,#4c1d95 100%);padding:20px 20px 0;position:relative;overflow:hidden}
.topbar::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;background:rgba(255,255,255,.06);border-radius:50%}
.topbar::after{content:'';position:absolute;bottom:-20px;left:30%;width:120px;height:120px;background:rgba(255,255,255,.04);border-radius:50%}
.topbar-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;position:relative;z-index:1}
.app-title{font-size:18px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;letter-spacing:-.3px}
.app-title span{font-weight:400;opacity:.7;font-size:13px}
.month-switcher{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.15);border-radius:24px;padding:5px 10px}
.month-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.8);font-size:18px;line-height:1;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background .15s}
.month-btn:hover{background:rgba(255,255,255,.2)}
.month-label{font-size:13px;font-weight:600;color:#fff;min-width:88px;text-align:center}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:680px;background:#fff;border-top:1px solid var(--border);display:flex;z-index:100;padding:6px 4px calc(6px + env(safe-area-inset-bottom));box-shadow:0 -4px 20px rgba(0,0,0,.08)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;border:none;background:none;cursor:pointer;font-family:'Inter',sans-serif;color:var(--text3);font-size:10px;font-weight:500;border-radius:12px;transition:color .15s;position:relative}
.bnav-btn .bicon{font-size:20px;line-height:1}
.bnav-btn.active{color:var(--nu)}
.bnav-btn.active::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:32px;height:3px;background:var(--nu);border-radius:0 0 4px 4px}
.bnav-btn.add-btn{color:#fff}
.bnav-btn.add-btn .bicon-wrap{background:linear-gradient(135deg,var(--nu),var(--c6));border-radius:14px;width:44px;height:32px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:1px;box-shadow:0 4px 12px rgba(124,58,237,.4)}

/* ── CONTENT ── */
.content{padding:16px 16px 8px}
.page{display:none}.page.active{display:block}

/* ── HERO CARD ── */
.hero{background:linear-gradient(135deg,#1e1b4b,#4c1d95);border-radius:var(--radius);padding:22px;margin-bottom:14px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-30px;right:-30px;width:140px;height:140px;background:rgba(255,255,255,.07);border-radius:50%}
.hero-label{font-size:11px;font-weight:600;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.hero-val{font-size:36px;font-weight:700;line-height:1;margin-bottom:6px;color:#fff;letter-spacing:-1px}
.hero-val.neg{color:#fca5a5}
.hero-sub{font-size:12px;color:rgba(255,255,255,.55)}
.hero-divider{height:1px;background:rgba(255,255,255,.15);margin:16px 0}
.hero-row{display:flex;justify-content:space-between}
.hero-stat{text-align:center;flex:1;position:relative;z-index:1}
.hero-stat-val{font-size:15px;font-weight:600;color:#fff}
.hero-stat-lbl{font-size:11px;color:rgba(255,255,255,.5);margin-top:3px}
.hero-stat+.hero-stat{border-left:1px solid rgba(255,255,255,.15)}

/* ── METRIC GRID ── */
.mgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.mcard{background:var(--surface);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
.mcard-label{font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:500;display:flex;align-items:center;gap:5px}
.mcard-emoji{font-size:14px}
.mcard-val{font-size:20px;font-weight:700;letter-spacing:-.5px}
.mcard-sub{font-size:11px;color:var(--text3);margin-top:4px}

/* ── CHART CARD ── */
.chart-card{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.chart-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:14px}
.chart-wrap{position:relative;height:170px}
canvas{display:block}
.legend{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:12px}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)}
.leg-dot{width:8px;height:8px;border-radius:50%;flex:0 0 8px}

/* ── CAT BARS ── */
.catbar{margin-bottom:12px}
.catbar-info{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.catbar-name{font-size:12px;color:var(--text2);font-weight:500}
.catbar-vals{font-size:12px;font-weight:600;color:var(--text)}
.catbar-pct{font-size:11px;color:var(--text3);margin-left:4px}
.track{height:7px;background:#f1f5f9;border-radius:4px;overflow:hidden}
.fill{height:7px;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* ── LIST CARDS ── */
.list-card{background:var(--surface);border-radius:var(--radius);overflow:visible;margin-bottom:12px;box-shadow:var(--shadow)}
.list-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.list-title{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--text)}
.pill{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;letter-spacing:.2px}
.pill-nu{background:var(--nu-bg);color:var(--nu-txt)}
.pill-c6{background:var(--c6-bg);color:var(--c6-txt)}
.pill-fix{background:var(--fix-bg);color:var(--fix-txt)}
.pill-in{background:var(--in-bg);color:var(--in)}
.pill-rai{background:var(--rai-bg);color:var(--rai-txt)}
.item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #f8fafc;overflow:visible}
.item:last-child{border-bottom:none}
.item-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex:0 0 36px;font-size:16px}
.item-body{flex:1;min-width:0;overflow:hidden}
.item-desc{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.item-date{font-size:11px;color:var(--text3);margin-top:2px}
.item-right{display:flex;align-items:center;gap:6px;flex:0 0 auto}
.item-val{font-size:13px;font-weight:600;color:var(--text)}
.item-val.pos{color:var(--in)}
.item-actions{display:flex;gap:5px;flex:0 0 auto}
.act-btn{border:none;cursor:pointer;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex:0 0 32px;transition:transform .1s,opacity .15s}
.act-btn:hover{transform:scale(1.1)}
.act-btn.edit{background:var(--c6-bg)}
.act-btn.del{background:var(--danger-bg)}
.list-foot{padding:12px 16px;background:#f8fafc;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius)}
.foot-lbl{font-size:12px;color:var(--text2);font-weight:500}
.foot-val{font-size:15px;font-weight:700;color:var(--text)}
.empty{padding:28px 16px;text-align:center;font-size:13px;color:var(--text3)}

/* ── EDIT ROW ── */
.edit-row{display:flex;align-items:center;gap:6px;padding:10px 16px;background:#f8fafc;border-bottom:1px solid var(--border)}
.edit-row input{flex:1;padding:8px 10px;font-size:13px;border:1.5px solid var(--border);border-radius:8px;background:#fff;color:var(--text);font-family:'Inter',sans-serif}
.edit-row input:focus{outline:none;border-color:var(--nu)}
.edit-row input.val-inp{width:90px;flex:0 0 90px}
.btn-ok{background:var(--nu);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.btn-cancel{background:none;border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px;cursor:pointer;color:var(--text2);font-family:'Inter',sans-serif}

/* ── FORM ── */
.form-card{background:var(--surface);border-radius:var(--radius);padding:20px;margin-bottom:12px;box-shadow:var(--shadow)}
.form-section{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.fg{margin-bottom:14px}
.flabel{font-size:12px;color:var(--text2);display:block;margin-bottom:6px;font-weight:500}
input,select{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;background:#fff;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;transition:border-color .15s}
input:focus,select:focus{outline:none;border-color:var(--nu)}
.row2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.btn-submit{width:100%;padding:13px;background:linear-gradient(135deg,var(--nu),var(--c6));color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin-top:6px;letter-spacing:.2px;box-shadow:0 4px 14px rgba(124,58,237,.35);transition:opacity .15s,transform .1s}
.btn-submit:hover{opacity:.92;transform:translateY(-1px)}
.toast{font-size:12px;color:var(--in);background:var(--in-bg);border-radius:10px;padding:10px 14px;text-align:center;margin-top:12px;display:none;font-weight:500}

/* ── MONTH MANAGER ── */
.month-mgr{background:var(--surface);border-radius:var(--radius);padding:20px;margin-bottom:12px;box-shadow:var(--shadow)}
.month-list-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f1f5f9}
.month-list-item:last-child{border-bottom:none}
.month-name{font-size:14px;color:var(--text);font-weight:500}
.month-stats{font-size:11px;color:var(--text3);margin-top:2px}
.btn-month-sel{background:var(--nu);color:#fff;border:none;border-radius:10px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.btn-month-sel.current{background:var(--nu-bg);color:var(--nu-txt);border:none}
.btn-new-month{width:100%;padding:12px;border:2px dashed var(--border);border-radius:12px;background:transparent;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s,border-color .15s}
.btn-new-month:hover{background:var(--nu-bg);border-color:var(--nu);color:var(--nu-txt)}

/* ── CARD SELECTOR ── */
.card-selector{display:flex;gap:10px;margin-bottom:14px}
.csel-btn{flex:1;padding:12px 8px;border-radius:14px;border:2px solid var(--border);background:var(--surface);font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;font-family:'Inter',sans-serif;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .2s;box-shadow:var(--shadow)}
.csel-btn:hover{border-color:var(--nu);color:var(--nu)}
.csel-btn.active{border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(0,0,0,.2)}
.csel-btn .csel-icon{font-size:20px}
.csel-btn .csel-val{font-size:11px;font-weight:500;opacity:.85}

/* ── PAGE TITLE ── */
.page-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:16px;letter-spacing:-.4px}
</style>

function load(){try{const s=localStorage.getItem(SK);if(s)return JSON.parse(s);}catch(e){}return defaultData();}
function save(){try{localStorage.setItem(SK,JSON.stringify(G));}catch(e){}}

let G=load();
function M(){return G.months[G.current];}
const fmt=v=>'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtS=v=>Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const sum=a=>a.reduce((t,i)=>t+(+i.val||0),0);

let editingChart=null;

/* ---- PAINEL ---- */
function renderPainel(){
  const m=M();
  const tmu=sum(m.mnu),tmc=sum(m.mc6),tru=sum(m.rnu),trc=sum(m.rc6),tfix=sum(m.fix);
  const tEnt=sum(m.entradas);
  const tMarcio=tmu+tmc+tfix;
  const tRai=tru+trc;
  const saldo=tEnt-tMarcio;
  const grand=tMarcio+tRai;

  const heroValClass=saldo>=0?'hero-val':'hero-val neg';

  let html=`
  <div class="hero">
    <div class="hero-label">Saldo do mês — Márcio</div>
    <div class="${heroValClass}">${fmt(saldo)}</div>
    <div class="hero-sub">Entradas ${fmt(tEnt)} · Gastos ${fmt(tMarcio)}</div>
    <div class="hero-divider"></div>
    <div class="hero-row">
      <div class="hero-stat"><div class="hero-stat-val">${fmt(tmu)}</div><div class="hero-stat-lbl">🟣 Nubank</div></div>
      <div class="hero-stat"><div class="hero-stat-val">${fmt(tmc)}</div><div class="hero-stat-lbl">⚫ C6</div></div>
      <div class="hero-stat"><div class="hero-stat-val">${fmt(tfix)}</div><div class="hero-stat-lbl">🏠 Fixos</div></div>
    </div>
  </div>
  <div class="mgrid">
    <div class="mcard" style="border-left:4px solid var(--rai);border-radius:0 var(--radius) var(--radius) 0">
      <div class="mcard-label"><span class="mcard-emoji">💗</span>Total Raíssa</div>
      <div class="mcard-val" style="color:var(--rai)">${fmt(tRai)}</div>
      <div class="mcard-sub">Nu ${fmt(tru)} · C6 ${fmt(trc)}</div>

let chartM=null,chartR=null;
function drawDonut(canvasId,legendId,data,colors,labels){
  const ctx=document.getElementById(canvasId);
  if(!ctx)return;
  if(canvasId==='chart-donut-m'){if(chartM){chartM.destroy();chartM=null;} if(editingChart){editingChart.destroy();editingChart=null;}}
  if(canvasId==='chart-donut-r'){if(chartR){chartR.destroy();chartR=null;}}
  const chart=new Chart(ctx,{
    type:'doughnut',
    data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:0,hoverOffset:4}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:false},tooltip:{callbacks:{label:i=>` ${i.label}: R$ ${fmtS(i.raw)}`}}}}
  });
  if(canvasId==='chart-donut-m'){chartM=chart;editingChart=chart;}
  if(canvasId==='chart-donut-r')chartR=chart;
  const leg=document.getElementById(legendId);
  if(leg)leg.innerHTML=labels.map((l,i)=>`<div class="leg-item"><span class="leg-dot" style="background:${colors[i]}"></span>${l}</div>`).join('');
}

function drawLine(labels,vals){
  const ctx=document.getElementById('chart-line');
  if(!ctx)return;
  new Chart(ctx,{
    type:'bar',
    data:{labels,datasets:[{label:'Total gasto',data:vals,backgroundColor:'#7c3aed30',borderColor:'#7c3aed',borderWidth:1.5,borderRadius:6}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:i=>`R$ ${fmtS(i.raw)}`}}},scales:{y:{ticks:{callback:v=>'R$'+Math.round(v/1000)+'k',font:{size:10}},grid:{color:'rgba(0,0,0,.05)'}},x:{grid:{display:false},ticks:{font:{size:10}}}}}
  });
}

function renderFixos(){
  const m=M();
  const items=m.fix;
  const today=new Date();
  const todayDay=today.getDate();

  function vencStatus(venc){
    if(!venc)return null;
    const day=parseInt(venc);
    if(isNaN(day))return null;
    const diff=day-todayDay;
    if(diff<0)return{label:'Vencido',color:'#dc2626',bg:'#fee2e2'};
    if(diff===0)return{label:'Vence hoje',color:'#d97706',bg:'#fef3c7'};
    if(diff<=3)return{label:`${diff}d`,color:'#d97706',bg:'#fef3c7'};
    return{label:`dia ${day}`,color:'var(--text3)',bg:'transparent'};
  }

  const rows=items.length?items.map((it,i)=>{
    const pago=!!it.pago;
    const vs=vencStatus(it.venc);
    const rowStyle=pago?'opacity:.5':'';
    return `<div id="row-fix-${i}" style="${rowStyle}">
      <div class="item" style="${pago?'background:#f8fafc':''}">
        <div class="item-icon" style="background:${pago?'#f1f5f9':'var(--fix-bg)'}">${pago?'✅':'🏠'}</div>
        <div class="item-body">
          <div class="item-desc" style="${pago?'text-decoration:line-through;color:var(--text3)':''}">  ${it.desc}</div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:3px">
            ${it.data?`<span style="font-size:11px;color:var(--text3)">${it.data}</span>`:''}
            ${it.venc?`<span style="font-size:10px;font-weight:600;padding:1px 6px;border-radius:6px;background:${vs?vs.bg:'transparent'};color:${vs?vs.color:'var(--text3)'}">📅 Vence dia ${it.venc}</span>`:''}
            ${vs&&vs.label==='Vencido'&&!pago?`<span style="font-size:10px;font-weight:700;color:#dc2626">⚠️ ${vs.label}</span>`:''}
          </div>
        </div>
        <div class="item-right">
          <span class="item-val" style="${pago?'color:var(--text3)':''}">${fmt(it.val)}</span>
          <div class="item-actions">
            <button class="act-btn" style="background:${pago?'#dcfce7':'#f1f5f9'};font-size:15px" onclick="togglePago('fix',${i})" title="${pago?'Desmarcar pagamento':'Confirmar pagamento'}">${pago?'✅':'☑️'}</button>
            <button class="act-btn edit" onclick="startEditFix(${i})">✏️</button>
            <button class="act-btn del" onclick="confirmDel('fix',${i})">🗑️</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join(''):`<div class="empty">Nenhum fixo</div>`;

  const total=sum(items);
  const totalPago=items.filter(i=>i.pago).reduce((t,i)=>t+(+i.val||0),0);
  const totalPendente=total-totalPago;
  const pct=total>0?Math.round(totalPago/total*100):0;

  document.getElementById('tab-fixos').innerHTML=`
    <div>
      <div class="page-title">🏠 Fixos</div>

      <div style="background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <span style="font-size:13px;font-weight:600;color:var(--text)">Progresso do mês</span>
          <span style="font-size:13px;font-weight:700;color:var(--fix)">${pct}% pago</span>
        </div>
        <div class="track"><div class="fill" style="width:${pct}%;background:var(--fix)"></div></div>
        <div style="display:flex;justify-content:space-between;margin-top:10px">
          <div style="text-align:center">
            <div style="font-size:14px;font-weight:700;color:var(--fix)">${fmt(totalPago)}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px">✅ Pago</div>
          </div>
          <div style="text-align:center">
            <div style="font-size:14px;font-weight:700;color:var(--danger)">${fmt(totalPendente)}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px">⏳ Pendente</div>
          </div>
          <div style="text-align:center">
            <div style="font-size:14px;font-weight:700;color:var(--text)">${fmt(total)}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px">Total</div>
          </div>
        </div>
      </div>

      <div class="list-card">
        <div class="list-head">
          <div class="list-title"><span class="pill pill-fix">Sem cartão</span> Fixos</div>
          <span style="font-size:11px;color:var(--text3)">${items.length} itens</span>
        </div>
        <div id="list-body-fix">${rows}</div>
        <div class="list-foot"><span class="foot-lbl">Total</span><span class="foot-val">${fmt(total)}</span></div>
      </div>
    </div>`;
}

        <div class="form-section">📆 Meses cadastrados</div>
        ${list||'<div class="empty">Nenhum mês</div>'}
        <button class="btn-new-month" onclick="addMonth()">➕ Novo mês</button>
        <button class="btn-new-month" style="margin-top:6px;color:#dc2626;border-color:#fca5a5" onclick="restoreDefault()">🔄 Restaurar dados originais do Julho 2026</button>
      </div>
    </div>`;
}

function selectMonth(i){G.current=i;save();renderAll();updateMonthLabel();}
function prevMonth(){if(G.current>0){G.current--;save();renderAll();updateMonthLabel();}}
function nextMonth(){if(G.current<G.months.length-1){G.current++;save();renderAll();updateMonthLabel();}}
function updateMonthLabel(){document.getElementById('month-label').textContent=M().name;}

function addMonth(){
  const now=new Date();
  const defaultName=`${MONTHS_NAMES[now.getMonth()]} ${now.getFullYear()}`;
  const name=prompt('Nome do mês (ex: Agosto 2026):',defaultName);
  if(!name||!name.trim())return;
  const nm=blankMonth(name.trim());
  G.months.push(nm);
  G.current=G.months.length-1;
  save();renderAll();updateMonthLabel();goTab('meses');
}

function restoreDefault(){
  if(!confirm('Isso vai restaurar todos os lançamentos originais do Julho 2026, substituindo o mês atual. Continuar?'))return;
  const fresh=defaultData();
  G.months[G.current]=fresh.months[0];
  save();renderAll();updateMonthLabel();
  alert('Lançamentos do Julho 2026 restaurados!');
}

function addEntrada(){
  const desc=document.getElementById('e-desc').value.trim();
  const val=parseFloat(document.getElementById('e-val').value);
  const data=document.getElementById('e-data').value.trim();
  if(!desc||isNaN(val)||val<=0)return;
  M().entradas.push({desc,val,data});
  save();renderAll();
  document.getElementById('e-desc').value='';
  document.getElementById('e-val').value='';
  document.getElementById('e-data').value='';
  showToast('toast-e');
}

function toggleVenc(){
  const tipo=document.getElementById('f-tipo')?.value;
  const fg=document.getElementById('fg-venc');
  if(fg)fg.style.display=tipo==='fix'?'block':'none';
}

function calcParcela(){
  const val=parseFloat(document.getElementById('f-val')?.value)||0;
  const atual=parseInt(document.getElementById('f-parc-atual')?.value)||0;
  const total=parseInt(document.getElementById('f-parc-total')?.value)||0;
  const preview=document.getElementById('parc-preview');
  if(!preview)return;
  if(val>0&&total>1){
    const parcVal=val/total;
    preview.style.display='block';
    preview.textContent=`Parcela: R$ ${parcVal.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})} ${atual&&total?`(${atual}-${total})`:''}`;
  } else {
    preview.style.display='none';
  }
}

function addGasto(){
  const pessoa=document.getElementById('f-pessoa').value;
  const tipo=document.getElementById('f-tipo').value;
  const desc=document.getElementById('f-desc').value.trim();
  const val=parseFloat(document.getElementById('f-val').value);
  const data=document.getElementById('f-data').value.trim();
  const parcAtual=parseInt(document.getElementById('f-parc-atual')?.value)||0;
  const parcTotal=parseInt(document.getElementById('f-parc-total')?.value)||0;
  if(!desc||isNaN(val)||val<=0)return;
  const isParcelado=parcTotal>1;
  const valorFinal=isParcelado?val/parcTotal:val;
  const sufixo=isParcelado&&parcAtual&&parcTotal?` ${parcAtual}-${parcTotal}`:(isParcelado&&parcTotal?` 1-${parcTotal}`:'');
  const descFinal=desc+sufixo;
  const venc=tipo==='fix'?(document.getElementById('f-venc')?.value.trim()||''):'';
  const key=pessoa==='Márcio'?(tipo==='nu'?'mnu':tipo==='c6'?'mc6':'fix'):(tipo==='nu'?'rnu':'rc6');
  M()[key].push({desc:descFinal,val:parseFloat(valorFinal.toFixed(2)),data,...(tipo==='fix'&&venc?{venc}:{})});
  save();renderAll();
  document.getElementById('f-desc').value='';
  document.getElementById('f-val').value='';
  document.getElementById('f-data').value='';
  document.getElementById('f-parc-atual').value='';
  document.getElementById('f-parc-total').value='';
  if(document.getElementById('f-venc'))document.getElementById('f-venc').value='';
  const preview=document.getElementById('parc-preview');
  if(preview)preview.style.display='none';
  showToast('toast-g');
}

function showToast(id){
  const el=document.getElementById(id);
  if(!el)return;
  el.style.display='block';
  setTimeout(()=>el.style.display='none',2200);
}

let activeTab='painel';
function goTab(id){
  ['painel','marcio','raissa','fixos','entradas','add','meses'].forEach(t=>{
    const b=document.getElementById('bn-'+t);
    if(b)b.classList.toggle('active',t===id);
  });
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  activeTab=id;
  if(editingChart&&id==='painel'){editingChart.destroy();editingChart=null;}
  if(chartR&&id!=='painel'){chartR.destroy();chartR=null;}
  renderTab(id);
}

function renderTab(id){
  if(id==='painel')renderPainel();
  else if(id==='marcio')renderMarcio();
  else if(id==='raissa')renderRaissa();
  else if(id==='fixos')renderFixos();
  else if(id==='entradas')renderEntradas();
  else if(id==='add')renderAdd();
  else if(id==='meses')renderMeses();
}

function renderAll(){
  if(editingChart){editingChart.destroy();editingChart=null;}
  renderTab(activeTab);
  updateMonthLabel();
}

renderAll();
</script>
